name: Update Football Teams JSON

on:
  workflow_dispatch:  # Allow manual run
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 6 AM UTC

jobs:
  update-teams:
    runs-on: ubuntu-latest

    steps:
      - name: 🛎️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: ⚽ Run fetch_teams.py
        env:
          API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: |
          echo "Starting team fetch..."
          python team_info.py

      - name: 🚀 Commit and push changes
          run: |
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            
            # 1. Add the files to staging
            git add teams/
            
            # 2. Check if there are changes to commit
            if git diff --staged --quiet; then
              echo "No changes detected, skipping commit."
            else
              # 3. Pull latest changes (rebase) before pushing
              git pull origin main --rebase
              
              # 4. Commit and push
              git commit -m "⚽ Update team data ($(date))"
              git push origin main
            fi
