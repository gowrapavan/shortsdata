name: Update Football Teams JSON

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  update-teams:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install Dependencies
        run: pip install requests

      - name: ⚽ Run team_info.py
        env:
          API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: python team_info.py

      - name: 🚀 Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. Clean up
          git clean -fd
          git checkout -- .
          git pull origin main --rebase
          
          # 2. Add ALL files in the directory
          git add .
          
          # 3. Debugging: Show us what Git thinks is changed
          echo "Status of the repo:"
          git status
          
          # 4. Commit only if there are actual changes
          if git diff --staged --quiet; then
            echo "No changes detected."
          else
            git commit -m "⚽ Update data $(date)"
            git push origin main
          fi
