name: Update Shorts & Videos JSON

on:
  schedule:
    - cron: "0 */3 * * *"  # every 3 hours
  workflow_dispatch:        # allow manual run

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Scripts
        run: |
          python main.py
          python video.py

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add shorts_data/shorts.json videos_data/videos.json
          # Only commit if there are changes to avoid error
          git commit -m "Auto-update: Refresh shorts and videos data" || echo "No changes to commit"
          git push
