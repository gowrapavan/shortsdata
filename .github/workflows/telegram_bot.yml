name: Telegram Auto-Poster Bot

on:
  schedule:
    # Runs at 11:30 AM UTC (5:00 PM IST)
    - cron: '30 11 * * *'
  workflow_dispatch: 

jobs:
  post-matches:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow requests colorthief

      - name: Run Telegram Bot
        run: |
          cd Telegram
          python bot.py

      - name: Pull latest changes safely (Stash method)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # Temporarily hide the generated images and text file
          git stash
          # Safely pull any new updates from your repository
          git pull origin main --rebase
          # Bring the generated files back
          git stash pop || true

      - name: Save memory to prevent duplicates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update posted matches [skip ci]"
          file_pattern: "Telegram/posted_matches.txt"
