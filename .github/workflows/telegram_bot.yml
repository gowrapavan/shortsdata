name: Telegram Auto-Poster Bot

on:
  schedule:
    # Runs automatically every day at 11:30 AM UTC (which is exactly 5:00 PM IST)
    - cron: '30 5 * * *'
  workflow_dispatch: # Adds a button in the Actions tab to run it manually

jobs:
  post-matches:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 🚨 Required to save the tracking file!

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow requests colorthief

      - name: Run Telegram Bot
        run: |
          cd Telegram
          python bot.py

      - name: Save memory to prevent duplicates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update posted matches [skip ci]"
          file_pattern: "Telegram/posted_matches.txt"
